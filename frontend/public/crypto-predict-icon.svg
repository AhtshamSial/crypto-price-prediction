<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131c2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f7ef7"/>
      <stop offset="100%" stop-color="#7c5bf5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f7ef7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c5bf5" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#4f7ef7" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Glow circle behind chart -->
  <circle cx="256" cy="272" r="140" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- Chart candlestick area — price line (going up) -->
  <!-- Main rising chart line -->
  <polyline
    points="72,360  132,320  178,338  224,290  268,248  316,220  364,178  428,128"
    stroke="url(#accentGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Fill under the line -->
  <polygon
    points="72,360  132,320  178,338  224,290  268,248  316,220  364,178  428,128  428,400  72,400"
    fill="url(#accentGrad)"
    opacity="0.07"
  />

  <!-- Candlestick bars (4 bars) -->
  <!-- Bar 1 — red (down) -->
  <rect x="108" y="310" width="20" height="44" rx="3" fill="#ef4444" opacity="0.85"/>
  <line x1="118" y1="300" x2="118" y2="310" stroke="#ef4444" stroke-width="2.5" opacity="0.85"/>
  <line x1="118" y1="354" x2="118" y2="366" stroke="#ef4444" stroke-width="2.5" opacity="0.85"/>

  <!-- Bar 2 — green (up) -->
  <rect x="196" y="278" width="20" height="52" rx="3" fill="url(#greenGrad)" opacity="0.9"/>
  <line x1="206" y1="264" x2="206" y2="278" stroke="#10b981" stroke-width="2.5" opacity="0.9"/>
  <line x1="206" y1="330" x2="206" y2="346" stroke="#10b981" stroke-width="2.5" opacity="0.9"/>

  <!-- Bar 3 — green (up) -->
  <rect x="284" y="228" width="20" height="48" rx="3" fill="url(#greenGrad)" opacity="0.9"/>
  <line x1="294" y1="214" x2="294" y2="228" stroke="#10b981" stroke-width="2.5" opacity="0.9"/>
  <line x1="294" y1="276" x2="294" y2="292" stroke="#10b981" stroke-width="2.5" opacity="0.9"/>

  <!-- Bar 4 — green (up) -->
  <rect x="372" y="180" width="20" height="52" rx="3" fill="url(#greenGrad)" opacity="0.9"/>
  <line x1="382" y1="164" x2="382" y2="180" stroke="#10b981" stroke-width="2.5" opacity="0.9"/>
  <line x1="382" y1="232" x2="382" y2="248" stroke="#10b981" stroke-width="2.5" opacity="0.9"/>

  <!-- AI prediction dot + pulse ring at forecast tip -->
  <circle cx="428" cy="128" r="28" stroke="url(#accentGrad)" stroke-width="2" fill="none" opacity="0.35"/>
  <circle cx="428" cy="128" r="18" stroke="url(#accentGrad)" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="428" cy="128" r="9" fill="url(#accentGrad)" filter="url(#softGlow)"/>

  <!-- Dashed forecast extension line -->
  <line x1="428" y1="128" x2="480" y2="92"
    stroke="url(#accentGrad)"
    stroke-width="3"
    stroke-dasharray="6 5"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- Small circuit/AI nodes — decorative -->
  <circle cx="480" cy="92" r="5" fill="#4f7ef7" opacity="0.6"/>
  <circle cx="72" cy="360" r="6" fill="#4f7ef7" opacity="0.5"/>

  <!-- Top-left: tiny neural network dots + lines -->
  <g opacity="0.4" filter="url(#glow)">
    <circle cx="82" cy="82" r="5" fill="#4f7ef7"/>
    <circle cx="114" cy="64" r="4" fill="#7c5bf5"/>
    <circle cx="114" cy="100" r="4" fill="#7c5bf5"/>
    <circle cx="148" cy="52" r="3.5" fill="#4f7ef7"/>
    <circle cx="148" cy="82" r="3.5" fill="#4f7ef7"/>
    <circle cx="148" cy="112" r="3.5" fill="#4f7ef7"/>
    <line x1="82" y1="82" x2="114" y2="64" stroke="#4f7ef7" stroke-width="1.5"/>
    <line x1="82" y1="82" x2="114" y2="100" stroke="#4f7ef7" stroke-width="1.5"/>
    <line x1="114" y1="64" x2="148" y2="52" stroke="#7c5bf5" stroke-width="1.2"/>
    <line x1="114" y1="64" x2="148" y2="82" stroke="#7c5bf5" stroke-width="1.2"/>
    <line x1="114" y1="100" x2="148" y2="82" stroke="#7c5bf5" stroke-width="1.2"/>
    <line x1="114" y1="100" x2="148" y2="112" stroke="#7c5bf5" stroke-width="1.2"/>
  </g>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.25"/>
</svg>
