# nixpacks.toml — place in fastapi_backend/ alongside main.py
#
# FIX: use "python -m pip" instead of bare "pip"
# Nixpacks virtualenv is at /opt/venv/bin/ but "pip" is not on PATH
# during the install phase — "python -m pip" always works.

[variables]
PIP_EXTRA_INDEX_URL = "https://download.pytorch.org/whl/cpu"

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install torch==2.3.1+cpu --extra-index-url https://download.pytorch.org/whl/cpu --no-cache-dir",
  "python -m pip install -r requirements.txt --no-cache-dir"
]
