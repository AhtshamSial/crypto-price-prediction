# railway.toml
# Place in fastapi_backend/ alongside main.py

[build]
builder = "nixpacks"

[build.env]
PIP_EXTRA_INDEX_URL = "https://download.pytorch.org/whl/cpu"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Health check: Railway pings /api/health to decide if deployment succeeded.
# We give it a long timeout because training runs in background after startup.
# The server responds to /api/health IMMEDIATELY (returns "starting" status).
[deploy.healthcheck]
path = "/api/health"
# Timeout: how long Railway waits for a single health check response (ms)
timeoutSeconds = 10
# Initial delay: how long to wait before first health check (server needs ~5s to bind port)
initialDelaySeconds = 10
